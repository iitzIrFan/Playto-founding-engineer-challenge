services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playto_payout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playto_payout
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playto_payout
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playto_payout
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
